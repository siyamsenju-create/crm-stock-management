<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexus CRM - New Order</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "surface": "#fcf8fa",
                        "secondary": "#515f74",
                        "on-primary-fixed-variant": "#3f465c",
                        "status-success": "#10B981",
                        "inverse-on-surface": "#f3f0f2",
                        "on-error-container": "#93000a",
                        "status-error": "#EF4444",
                        "surface-container-high": "#eae7e9",
                        "on-secondary-fixed": "#0d1c2f",
                        "on-primary-container": "#7c839b",
                        "outline": "#76777d",
                        "inverse-surface": "#303032",
                        "tertiary-fixed-dim": "#dec29a",
                        "primary-fixed-dim": "#bec6e0",
                        "on-tertiary-fixed-variant": "#574425",
                        "on-tertiary-fixed": "#271901",
                        "secondary-fixed": "#d5e3fd",
                        "on-surface-variant": "#45464d",
                        "primary": "#000000",
                        "tertiary-container": "#271901",
                        "primary-container": "#131b2e",
                        "error-container": "#ffdad6",
                        "tertiary": "#000000",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#98805d",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#d5e3fd",
                        "on-secondary-container": "#57657b",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e4e2e4",
                        "on-background": "#1b1b1d",
                        "on-surface": "#1b1b1d",
                        "outline-variant": "#c6c6cd",
                        "primary-fixed": "#dae2fd",
                        "surface-tint": "#565e74",
                        "surface-bright": "#fcf8fa",
                        "tertiary-fixed": "#fcdeb5",
                        "surface-dim": "#dcd9db",
                        "secondary-fixed-dim": "#b9c7e0",
                        "surface-variant": "#e4e2e4",
                        "inverse-primary": "#bec6e0",
                        "surface-container": "#f0edef",
                        "status-info": "#3B82F6",
                        "on-primary-fixed": "#131b2e",
                        "background": "#fcf8fa",
                        "error": "#ba1a1a",
                        "border-subtle": "#E2E8F0",
                        "surface-container-low": "#f6f3f5",
                        "status-warning": "#F59E0B",
                        "surface-muted": "#F8FAFC"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-tablet": "24px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["JetBrains Mono"],
                        "title-lg": ["Inter"],
                        "label-md": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["10px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf8fa;
            font-family: 'Inter', sans-serif;
        }
        .form-section {
            background-color: #ffffff;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .scroll-container {
            height: calc(100vh - 120px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="text-on-surface">
<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant px-4 py-3 flex items-center">
<button class="flex items-center justify-center w-10 h-10 hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<div class="flex-1 flex justify-center pr-10">
<h1 class="font-headline-md text-headline-md text-primary">New Order</h1>
</div>
</header>
<!-- Main Content Area -->
<main class="mt-[64px] pb-[100px] px-4 pt-6 scroll-container">
<!-- Simplified Customer Selection -->
<div class="mb-6 bg-surface-container-low p-3 rounded-lg flex items-center gap-3 border border-outline-variant">
<span class="material-symbols-outlined text-secondary">person</span>
<div class="flex-1 relative">
<select class="w-full bg-transparent border-0 font-body-md text-primary appearance-none focus:ring-0 p-0 pr-6">
<option disabled="" selected="" value="">Select Customer</option>
<option>Global Industries Ltd.</option>
<option>Apex Solutions</option>
<option>Zenith Corp</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[18px]">expand_more</span>
</div>
</div>
</div>
<!-- Simplified Items Section -->
<section class="form-section">
<div class="flex items-center justify-between mb-6">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Order Items</h2>
<span class="text-label-sm font-medium text-secondary">2 Items</span>
</div>
<div class="space-y-6 mb-6">
<!-- Item 1 -->
<div class="flex justify-between items-start">
<div>
<p class="font-body-md font-semibold text-primary">Quantum Engine Core X-1</p>
<p class="text-label-md text-secondary mt-1">1 × $4,250.00</p>
</div>
<button class="text-outline hover:text-status-error transition-colors p-1">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Item 2 -->
<div class="flex justify-between items-start">
<div>
<p class="font-body-md font-semibold text-primary">Stabilization Gasket Set</p>
<p class="text-label-md text-secondary mt-1">12 × $15.00</p>
</div>
<button class="text-outline hover:text-status-error transition-colors p-1">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</div>
<button class="w-full py-3 flex items-center justify-center gap-2 border border-outline-variant rounded-lg text-secondary hover:bg-surface-container-low transition-colors font-label-md uppercase tracking-wide">
<span class="material-symbols-outlined text-[18px]">add</span>
            Add Product
        </button>
</section>
<!-- Simplified Logistics -->
<section class="form-section">
<div class="space-y-6">
<div>
<label class="font-label-sm text-secondary uppercase tracking-wider mb-2 block">Delivery Date</label>
<input class="w-full p-3 bg-surface-container-low border-0 border-b border-outline-variant rounded-none font-body-md text-body-md focus:border-primary outline-none px-0" type="date" value="2023-11-24"/>
</div>
<div>
<label class="font-label-sm text-secondary uppercase tracking-wider mb-2 block">Shipping Method</label>
<select class="w-full p-3 bg-surface-container-low border-0 border-b border-outline-variant rounded-none font-body-md text-body-md focus:border-primary outline-none px-0 appearance-none">
<option>Standard Freight</option>
<option>Priority Express</option>
<option>Next-Day Air</option>
</select>
</div>
</div>
</section>
<!-- Order Summary -->
<section class="px-2 mb-8">
<div class="flex justify-between items-center">
<span class="font-body-lg text-secondary">Total Amount</span>
<span class="font-headline-md text-primary">$4,919.40</span>
</div>
</section>
</main>
<!-- Simplified Footer -->
<footer class="fixed bottom-0 w-full z-50 bg-white border-t border-outline-variant px-4 py-4">
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-headline-md text-headline-md active:scale-[0.98] transition-all flex items-center justify-center gap-3">
        Create Order
    </button>
</footer>
<script>
    // Micro-interaction for feedback
    document.querySelector('footer button').addEventListener('click', function() {
        this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
        this.classList.add('opacity-80');
        setTimeout(() => {
            this.innerHTML = 'Order Created';
            this.classList.replace('bg-primary', 'bg-status-success');
            this.classList.remove('opacity-80');
        }, 1000);
    });
</script>
</body></html>
