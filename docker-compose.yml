version: '3.9'

services:
  # ── API Backend ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-api
    restart: unless-stopped
    ports:
      - '${PORT:-5005}:5005'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5005
      - MONGO_URI=mongodb://mongo:27017/${MONGO_DB_NAME:-crm-stock}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1h}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - api_logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5005/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: crm-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-crm-stock}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - crm-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - crm-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (Vite dev server) ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: crm-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:${PORT:-5005}/api/v1
    networks:
      - crm-network
    profiles:
      - dev  # Only run with: docker compose --profile dev up

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  mongo_config:
  redis_data:
  api_logs:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  crm-network:
    driver: bridge
