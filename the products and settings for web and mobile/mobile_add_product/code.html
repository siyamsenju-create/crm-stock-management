<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#004666",
                    "tertiary-fixed-dim": "#ffb695",
                    "on-surface": "#1b1b24",
                    "secondary-container": "#39b8fd",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface": "#fcf8ff",
                    "on-primary-fixed": "#0f0069",
                    "on-primary": "#ffffff",
                    "surface-bright": "#fcf8ff",
                    "error-container": "#ffdad6",
                    "surface-container": "#f0ecf9",
                    "on-secondary-fixed": "#001e2f",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#4d44e3",
                    "inverse-on-surface": "#f3effc",
                    "on-primary-container": "#dad7ff",
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#ffd2be",
                    "tertiary": "#7e3000",
                    "surface-container-high": "#eae6f4",
                    "on-surface-variant": "#464555",
                    "secondary-fixed-dim": "#89ceff",
                    "on-tertiary-fixed": "#351000",
                    "primary-container": "#4f46e5",
                    "on-background": "#1b1b24",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "tertiary-container": "#a44100",
                    "surface-dim": "#dcd8e5",
                    "surface-container-low": "#f5f2ff",
                    "surface-variant": "#e4e1ee",
                    "secondary": "#006591",
                    "background": "#fcf8ff",
                    "outline": "#777587",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#004c6e",
                    "outline-variant": "#c7c4d8",
                    "on-primary-fixed-variant": "#3323cc",
                    "inverse-primary": "#c3c0ff",
                    "primary-fixed-dim": "#c3c0ff",
                    "primary": "#3525cd",
                    "primary-fixed": "#e2dfff",
                    "inverse-surface": "#302f39",
                    "surface-container-highest": "#e4e1ee",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#c9e6ff",
                    "tertiary-fixed": "#ffdbcc"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "sm": "8px",
                    "3xl": "64px",
                    "xl": "32px",
                    "2xl": "48px",
                    "md": "16px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "display": ["Inter"],
                    "label-sm": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "h2": ["Inter"],
                    "h3": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-md": ["Inter"]
            },
            "fontSize": {
                    "display": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h3": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen">
<!-- Top Navigation Anchor (Suppressing global nav as per "Task-Focused" rule) -->
<header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md px-md h-16 flex items-center justify-between border-b border-surface-variant">
<div class="flex items-center gap-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-h2 text-h3 tracking-tight text-on-surface">Add Product</h1>
</div>
<button class="px-md py-xs font-label-md text-primary hover:bg-primary/5 rounded-lg transition-colors">
            Drafts
        </button>
</header>
<main class="max-w-md mx-auto px-md py-xl space-y-xl">
<!-- Hero Visual Section -->
<div class="relative w-full aspect-[16/10] rounded-xl overflow-hidden shadow-sm group border border-surface-variant">
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent z-10"></div>
<img alt="New Product Preview" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" data-alt="overhead shot of organized retail products on a clean white surface with soft studio lighting and minimal shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMhcuokd4LaiKpvbNzd0yreIRclMLtloNdahW7pn4EhdDS6zar4KJhsKC6bX-7Y1OdIgiCR64PJvUaqTkZ65h4QM9E2-2XhD4BLLLd0Yjp9nYrAmiCz8qfSLD9SwnRLrHO9rNHRhWpKz3_qTlha-DzM-O_iOk9xxkWll_Ewg8F2EAupvwd6V8zGiEgIuUEYTZxjPlklyA2K4qJX6Ax3Ejd7f0tFhyexVy9C2iKbtTuCQ3OHVSqbiVsHu5LVH6NYX6mNzZeMI2TBtU"/>
<div class="absolute bottom-md left-md z-20 flex items-center gap-sm">
<button class="bg-white/90 backdrop-blur px-md py-sm rounded-full flex items-center gap-xs shadow-lg border border-white/20">
<span class="material-symbols-outlined text-primary text-[20px]">add_a_photo</span>
<span class="font-label-md text-on-surface">Add Photo</span>
</button>
</div>
</div>
<!-- Form Canvas -->
<div class="space-y-lg">
<!-- Section Title -->
<div class="space-y-xs">
<p class="font-label-sm text-primary uppercase tracking-widest">General Information</p>
<div class="h-0.5 w-8 bg-primary rounded-full"></div>
</div>
<!-- Product Name -->
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant flex justify-between" for="product_name">
                    Product Name
                    <span class="text-error font-body-sm">*</span>
</label>
<input class="w-full h-14 px-md bg-surface border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl font-body-md transition-all placeholder:text-outline" id="product_name" placeholder="e.g. Wireless Noise Cancelling Headphones" type="text"/>
</div>
<!-- SKU with Barcode Scanner -->
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant" for="sku">SKU / Barcode</label>
<div class="relative flex items-center">
<input class="w-full h-14 pl-md pr-[60px] bg-surface border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl font-body-md transition-all placeholder:text-outline" id="sku" placeholder="Scan or enter SKU code" type="text"/>
<button class="absolute right-xs w-12 h-12 flex items-center justify-center bg-primary-fixed text-on-primary-fixed-variant rounded-lg hover:bg-primary-fixed/80 transition-colors">
<span class="material-symbols-outlined" data-icon="barcode_scanner">barcode_scanner</span>
</button>
</div>
</div>
<!-- Pricing & Inventory Grid -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant" for="price">Price</label>
<div class="relative flex items-center">
<span class="absolute left-md text-on-surface-variant font-label-md">$</span>
<input class="w-full h-14 pl-[32px] pr-md bg-surface border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl font-body-md transition-all placeholder:text-outline" id="price" placeholder="0.00" type="number"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant" for="quantity">Quantity</label>
<div class="flex items-center bg-surface border border-outline-variant rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all h-14">
<button class="w-12 h-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<input class="w-full h-full text-center bg-transparent border-none focus:ring-0 font-body-md" id="quantity" type="number" value="0"/>
<button class="w-12 h-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
</div>
<!-- Advanced Details Bento Section -->
<div class="pt-md space-y-md">
<div class="space-y-xs">
<p class="font-label-sm text-primary uppercase tracking-widest">Inventory Management</p>
<div class="h-0.5 w-8 bg-primary rounded-full"></div>
</div>
<div class="grid grid-cols-1 gap-sm">
<div class="glass-panel border border-surface-variant p-md rounded-xl flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="warehouse">warehouse</span>
</div>
<div>
<p class="font-label-md text-on-surface">Warehouse Location</p>
<p class="text-body-sm text-on-surface-variant">Main Distribution Hub</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
<div class="glass-panel border border-surface-variant p-md rounded-xl flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="category">category</span>
</div>
<div>
<p class="font-label-md text-on-surface">Category</p>
<p class="text-body-sm text-on-surface-variant">Electronics &amp; Gadgets</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
</div>
</div>
<div class="h-24"></div> <!-- Spacer for fixed button -->
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 right-0 p-md bg-white/90 backdrop-blur-lg border-t border-surface-variant z-50">
<div class="max-w-md mx-auto grid grid-cols-1 gap-sm">
<button class="w-full h-14 bg-primary text-on-primary font-label-md text-body-md rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Save Product
            </button>
</div>
</footer>
</body></html>
